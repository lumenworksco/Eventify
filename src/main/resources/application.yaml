server:
  port: 3000

spring:
  application:
    name: fullstack-project
  datasource:
    url: jdbc:postgresql://localhost:5432/fullstack_project
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        auto_quote_keyword: true
        format_sql: true
    open-in-view: true
  sql:
    init:
      mode: never
      platform: postgresql
  security:
    oauth2:
      resourceserver:
        jwt:
          authority-prefix: ""

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

cors:
  allowed-origins:
    - http://localhost:8080