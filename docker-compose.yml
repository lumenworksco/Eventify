services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: eventify
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./Eventify-Back-End
    ports:
      - "8080:8080"
    environment:
      PGHOST: db
      PGPORT: 5432
      PGDATABASE: eventify
      PGUSER: postgres
      PGPASSWORD: postgres
      JWT_SECRET: change-me-in-production-use-a-strong-random-secret
    depends_on:
      - db

  frontend:
    build: ./Eventify-Front-End
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080/api

volumes:
  pgdata:
